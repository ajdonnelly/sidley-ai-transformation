<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Inter, Arial, sans-serif"><defs><marker id="ah2" markerWidth="12" markerHeight="12" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#dc4405"/></marker></defs><rect width="1280" height="820" fill="#ffffff"/><circle cx="70" cy="48" r="9" fill="none" stroke="#dc4405" stroke-width="3" stroke-dasharray="3 2"/><text x="90" y="54" font-size="17" font-weight="700" fill="#1a1a1a">CoCounsel</text><text x="210" y="54" font-size="16" fill="#6b7280">·  Deep Research  ·  Family Law Demo</text><line x1="64" y1="74" x2="1216" y2="74" stroke="#ececec" stroke-width="2"/><text x="64" y="126" font-size="14.5" font-weight="800" letter-spacing="2.5" fill="#dc4405">SYSTEMATIZE · KEEP IT GROWING</text><text x="64" y="166" font-size="31" font-weight="800" fill="#16140f">Your library is never finished</text><text x="64" y="200" font-size="17" fill="#6b7280">Building a prompt library is an ongoing loop — every turn makes it stronger and the team more confident.</text><!--curved arrows (clockwise)--><path d="M669 358 Q754 392 741 481" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah2)"/><path d="M712 533 Q640 590 570 533" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah2)"/><path d="M539 481 Q526 392 609 358" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah2)"/><!--center: growing library--><rect x="616" y="444" width="74" height="50" rx="8" fill="#f6d9cc"/><rect x="610" y="438" width="74" height="50" rx="8" fill="#fbe7dd"/><rect x="604" y="432" width="74" height="50" rx="8" fill="#ffffff" stroke="#dc4405" stroke-width="2"/><line x1="616" y1="448" x2="666" y2="448" stroke="#dc4405" stroke-width="2"/><line x1="616" y1="458" x2="666" y2="458" stroke="#f0c3b2" stroke-width="2"/><line x1="616" y1="468" x2="654" y2="468" stroke="#f0c3b2" stroke-width="2"/><text x="641" y="518" font-size="11.5" font-weight="800" letter-spacing="1" fill="#dc4405" text-anchor="middle">PROMPT LIBRARY</text><!--node: Log (top)--><circle cx="640" cy="308" r="50" fill="#dc4405"/><text x="640" y="315" font-size="19" font-weight="800" fill="#fff" text-anchor="middle">Log</text><text x="640" y="244" font-size="15.5" fill="#5b6166" text-anchor="middle">what you tried &amp; the catches you made</text><!--node: Review (lower-right)--><circle cx="770" cy="533" r="50" fill="#dc4405"/><text x="770" y="540" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">Review</text><text x="806" y="610" font-size="15.5" fill="#5b6166" text-anchor="middle">what happened, and why</text><!--node: Refine (lower-left)--><circle cx="510" cy="533" r="50" fill="#dc4405"/><text x="510" y="540" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">Refine</text><text x="474" y="610" font-size="15.5" fill="#5b6166" text-anchor="middle">the prompt for next time</text><!--callout--><rect x="69" y="644" width="1152" height="54" rx="13" fill="#16140f" opacity="0.10"/><rect x="66" y="639" width="1152" height="54" rx="13" fill="#16140f" opacity="0.06"/><rect x="64" y="636" width="1152" height="54" rx="13" fill="#ffffff" stroke="#dc4405" stroke-width="2.5"/><text x="640" y="670" font-size="17.5" font-weight="700" fill="#16140f" text-anchor="middle">Every turn of the loop <tspan fill="#dc4405">→</tspan> a stronger library and a more confident team.</text><text x="1216" y="810" font-size="11.5" fill="#b8bdc2" text-anchor="end">Illustrative UI mock for training · independent work sample, not affiliated with Thomson Reuters</text></svg>