<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Inter, Arial, sans-serif"><defs><marker id="ah3" markerWidth="12" markerHeight="12" refX="7.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#dc4405"/></marker></defs><rect width="1280" height="820" fill="#ffffff"/><circle cx="70" cy="48" r="9" fill="none" stroke="#dc4405" stroke-width="3" stroke-dasharray="3 2"/><text x="90" y="54" font-size="17" font-weight="700" fill="#1a1a1a">CoCounsel</text><text x="210" y="54" font-size="16" fill="#6b7280">·  Deep Research  ·  Family Law Demo</text><line x1="64" y1="74" x2="1216" y2="74" stroke="#ececec" stroke-width="2"/><text x="64" y="126" font-size="14.5" font-weight="800" letter-spacing="2.5" fill="#dc4405">SYSTEMATIZE · THE COMPOUNDING FLYWHEEL</text><text x="64" y="166" font-size="31" font-weight="800" fill="#16140f">How wins compound across the firm</text><text x="64" y="200" font-size="17" fill="#6b7280">When value depends on chance, it doesn’t scale. A shared library turns individual wins into firm-wide, compounding gains.</text><!--flywheel arrows (clockwise)--><path d="M598 255 Q640 222 682 255" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah3)"/><path d="M800 315 Q912 415 800 515" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah3)"/><path d="M682 575 Q640 608 598 575" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah3)"/><path d="M480 515 Q368 415 480 315" fill="none" stroke="#dc4405" stroke-width="3.5" marker-end="url(#ah3)"/><!--center: firm library--><rect x="616" y="400" width="76" height="54" rx="8" fill="#f6d9cc"/><rect x="610" y="394" width="76" height="54" rx="8" fill="#fbe7dd"/><rect x="604" y="388" width="76" height="54" rx="8" fill="#ffffff" stroke="#dc4405" stroke-width="2"/><line x1="616" y1="404" x2="666" y2="404" stroke="#dc4405" stroke-width="2"/><line x1="616" y1="414" x2="666" y2="414" stroke="#f0c3b2" stroke-width="2"/><line x1="616" y1="424" x2="654" y2="424" stroke="#f0c3b2" stroke-width="2"/><text x="640" y="474" font-size="11.5" font-weight="800" letter-spacing="1" fill="#dc4405" text-anchor="middle">FIRM AI ASSET LIBRARY</text><text x="640" y="492" font-size="11.5" fill="#8a9097" text-anchor="middle">prompts · skills · workflows</text><!--card 1: NW--><rect x="378" y="219" width="220" height="88" rx="14" fill="#ffffff" stroke="#e7e9eb" stroke-width="2"/><circle cx="406" cy="249" r="16" fill="#dc4405"/><text x="406" y="255" font-size="15" font-weight="800" fill="#fff" text-anchor="middle">1</text><text x="430" y="255" font-size="16.5" font-weight="800" fill="#16140f">Validated win</text><text x="402" y="280" font-size="13" fill="#5b6166">a proven prompt or</text><text x="402" y="298" font-size="13" fill="#5b6166">workflow that worked</text><!--card 2: NE--><rect x="682" y="219" width="220" height="88" rx="14" fill="#ffffff" stroke="#e7e9eb" stroke-width="2"/><circle cx="710" cy="249" r="16" fill="#dc4405"/><text x="710" y="255" font-size="15" font-weight="800" fill="#fff" text-anchor="middle">2</text><text x="734" y="255" font-size="16.5" font-weight="800" fill="#16140f">Recorded</text><text x="706" y="280" font-size="13" fill="#5b6166">added to the firm library —</text><text x="706" y="298" font-size="13" fill="#5b6166">a prompt, skill or workflow</text><!--card 3: SE--><rect x="682" y="523" width="220" height="88" rx="14" fill="#ffffff" stroke="#e7e9eb" stroke-width="2"/><circle cx="710" cy="553" r="16" fill="#dc4405"/><text x="710" y="559" font-size="15" font-weight="800" fill="#fff" text-anchor="middle">3</text><text x="734" y="559" font-size="16.5" font-weight="800" fill="#16140f">Adopted by others</text><text x="706" y="584" font-size="13" fill="#5b6166">teammates integrate the</text><text x="706" y="602" font-size="13" fill="#5b6166">proven asset into their work</text><!--card 4: SW--><rect x="378" y="523" width="220" height="88" rx="14" fill="#ffffff" stroke="#e7e9eb" stroke-width="2"/><circle cx="406" cy="553" r="16" fill="#dc4405"/><text x="406" y="559" font-size="15" font-weight="800" fill="#fff" text-anchor="middle">4</text><text x="430" y="559" font-size="16.5" font-weight="800" fill="#16140f">New wins emerge</text><text x="402" y="584" font-size="13" fill="#5b6166">they hit their own successes —</text><text x="402" y="602" font-size="13" fill="#5b6166">and the cycle begins again</text><!--callout--><rect x="69" y="638" width="1152" height="54" rx="13" fill="#16140f" opacity="0.10"/><rect x="66" y="633" width="1152" height="54" rx="13" fill="#16140f" opacity="0.06"/><rect x="64" y="630" width="1152" height="54" rx="13" fill="#ffffff" stroke="#dc4405" stroke-width="2.5"/><text x="640" y="664" font-size="17.5" font-weight="700" fill="#16140f" text-anchor="middle">Isolated breakthroughs <tspan fill="#dc4405">→</tspan> a compounding accretion of firm-wide value.</text><text x="1216" y="810" font-size="11.5" fill="#b8bdc2" text-anchor="end">Illustrative UI mock for training · independent work sample, not affiliated with Thomson Reuters</text></svg>