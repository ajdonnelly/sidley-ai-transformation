<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Inter, Arial, sans-serif">
<rect width="1280" height="820" fill="#ffffff"/>
<circle cx="70" cy="48" r="9" fill="none" stroke="#dc4405" stroke-width="3" stroke-dasharray="3 2"/><text x="90" y="54" font-size="17" font-weight="700" fill="#1a1a1a">CoCounsel</text><text x="210" y="54" font-size="16" fill="#6b7280">·  Deep Research  ·  Family Law Demo</text><line x1="64" y1="74" x2="1216" y2="74" stroke="#ececec" stroke-width="2"/>
<text x="64" y="126" font-size="14.5" font-weight="800" letter-spacing="2.5" fill="#dc4405">PROMPTING · VAGUE vs ICI</text>
<text x="64" y="166" font-size="31" font-weight="800" fill="#16140f">Same goal. Very different prompts.</text>
<text x="64" y="200" font-size="17" fill="#6b7280">The first leaves too much to chance. The second gives CoCounsel the clarity it needs — and the right tool for the job.</text>

<!-- LEFT: vague -->
<text x="64" y="240" font-size="13.5" font-weight="800" letter-spacing="2" fill="#9a9a95">VAGUE PROMPT</text>
<rect x="392" y="220" width="232" height="30" rx="15" fill="#f6ece9"/><text x="508" y="240" font-size="13.5" font-weight="700" fill="#b4472f" text-anchor="middle">✕  too much left to chance</text>
<rect x="64" y="258" width="560" height="118" rx="14" fill="#ffffff" stroke="#d7dade" stroke-width="2"/>
<text x="94" y="318" font-size="20" fill="#2a2a2a">Find problems with this expert.</text>
<line x1="64" y1="342" x2="624" y2="342" stroke="#ededed" stroke-width="1.5"/>
<text x="94" y="366" font-size="14.5" fill="#9aa0a6">⬆  Upload</text>
<rect x="546" y="348" width="62" height="26" rx="7" fill="#141414"/><text x="577" y="366" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Send</text>
<circle cx="76" cy="414" r="3.5" fill="#b6b6b1"/><text x="92" y="419" font-size="15.5" fill="#5b6166">No intent, no context, no specific action</text>
<circle cx="76" cy="444" r="3.5" fill="#b6b6b1"/><text x="92" y="449" font-size="15.5" fill="#5b6166">CoCounsel has to guess — and may pick the wrong tool</text>

<!-- RIGHT: ICI -->
<text x="656" y="240" font-size="13.5" font-weight="800" letter-spacing="2" fill="#dc4405">ICI PROMPT</text>
<rect x="990" y="220" width="226" height="30" rx="15" fill="#e7f3ea"/><text x="1103" y="240" font-size="13.5" font-weight="700" fill="#1d6b3a" text-anchor="middle">✓  focused &amp; on-target</text>
<rect x="656" y="258" width="560" height="258" rx="14" fill="#ffffff" stroke="#dc4405" stroke-width="2"/>
<text x="686" y="292" font-size="11.5" font-weight="800" letter-spacing="1.5" fill="#dc4405">INTENT</text>
<text x="686" y="314" font-size="15.5" fill="#2a2a2a">I&#8217;m preparing to challenge this expert&#8217;s credibility.</text>
<text x="686" y="348" font-size="11.5" font-weight="800" letter-spacing="1.5" fill="#dc4405">CONTEXT</text>
<text x="686" y="370" font-size="15.5" fill="#2a2a2a">The uploaded files are the expert&#8217;s prior testimony —</text>
<text x="686" y="390" font-size="15.5" fill="#2a2a2a">medical-malpractice matter, plaintiff side.</text>
<text x="686" y="424" font-size="11.5" font-weight="800" letter-spacing="1.5" fill="#dc4405">INSTRUCTION</text>
<text x="686" y="446" font-size="15.5" fill="#2a2a2a">Review each document and flag every statement about</text>
<text x="686" y="466" font-size="15.5" fill="#2a2a2a">the surgery and the plaintiff&#8217;s complications.</text>
<line x1="656" y1="482" x2="1216" y2="482" stroke="#f3ded4" stroke-width="1.5"/>
<text x="686" y="506" font-size="14.5" fill="#9aa0a6">⬆  Upload</text>
<rect x="1138" y="488" width="62" height="26" rx="7" fill="#141414"/><text x="1169" y="506" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Send</text>
<circle cx="668" cy="552" r="3.5" fill="#dc4405"/><text x="684" y="557" font-size="15.5" fill="#3f4144">Clear intent, context, and instruction &#8212; focused, relevant results</text>
<circle cx="668" cy="582" r="3.5" fill="#dc4405"/><text x="684" y="587" font-size="15.5" fill="#3f4144">CoCounsel selects the right Skill (Review Documents)</text>

<!-- callout -->
<rect x="69" y="632" width="1152" height="54" rx="13" fill="#16140f" opacity="0.10"/><rect x="66" y="627" width="1152" height="54" rx="13" fill="#16140f" opacity="0.06"/><rect x="64" y="624" width="1152" height="54" rx="13" fill="#ffffff" stroke="#dc4405" stroke-width="2.5"/>
<text x="640" y="658" font-size="17.5" font-weight="700" fill="#16140f" text-anchor="middle">Vague in <tspan fill="#dc4405">&#8594;</tspan> generic out.   ICI in <tspan fill="#dc4405">&#8594;</tspan> focused results, and the right tool for the job.</text>
<text x="1216" y="810" font-size="11.5" fill="#b8bdc2" text-anchor="end">Illustrative UI mock for training · independent work sample, not affiliated with Thomson Reuters</text></svg>
