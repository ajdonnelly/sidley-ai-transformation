<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Inter, Arial, sans-serif">
<rect width="1280" height="820" fill="#ffffff"/>
<circle cx="70" cy="48" r="9" fill="none" stroke="#dc4405" stroke-width="3" stroke-dasharray="3 2"/><text x="90" y="54" font-size="17" font-weight="700" fill="#1a1a1a">CoCounsel</text><text x="210" y="54" font-size="16" fill="#6b7280">·  Deep Research  ·  Family Law Demo</text><line x1="64" y1="74" x2="1216" y2="74" stroke="#ececec" stroke-width="2"/>
<text x="64" y="126" font-size="14.5" font-weight="800" letter-spacing="2.5" fill="#dc4405">SYSTEMATIZE · THE LIBRARY ENTRY</text>
<text x="64" y="166" font-size="31" font-weight="800" fill="#16140f">Anatomy of a great library entry</text>
<text x="64" y="200" font-size="17" fill="#6b7280">A strong entry captures more than the prompt text. Five fields make it clear, reliable, and ready to reuse.</text>

<!-- card -->
<rect x="64" y="244" width="1152" height="362" rx="16" fill="#ffffff" stroke="#dc4405" stroke-width="2"/>
<!-- header -->
<text x="92" y="282" font-size="11.5" font-weight="800" letter-spacing="1.5" fill="#dc4405">USE CASE</text>
<text x="92" y="310" font-size="22" font-weight="800" fill="#16140f">Challenge an opposing expert&#8217;s credibility</text>
<rect x="930" y="268" width="132" height="28" rx="14" fill="#eef2f5"/><text x="996" y="287" font-size="12" font-weight="700" letter-spacing="1" fill="#5b6166" text-anchor="middle">LITIGATION</text>
<text x="1176" y="292" font-size="24" fill="#dc4405" text-anchor="end">&#9733;</text>
<line x1="88" y1="330" x2="1192" y2="330" stroke="#eeeeee" stroke-width="1.5"/>

<!-- row A: ICI prompt -->
<rect x="92" y="349" width="192" height="28" rx="8" fill="#fbf3ef" stroke="#f0d9cf" stroke-width="1.5"/><text x="188" y="368" font-size="12" font-weight="800" letter-spacing="1" fill="#dc4405" text-anchor="middle">ICI PROMPT</text>
<text x="308" y="360" font-size="16" fill="#2a2a2a">Intent: challenge credibility · Context: prior testimony, med-mal, plaintiff</text>
<text x="308" y="382" font-size="16" fill="#2a2a2a">Instruction: flag every statement about the surgery &amp; complications</text>
<line x1="88" y1="402" x2="1192" y2="402" stroke="#f2f2f2" stroke-width="1.5"/>

<!-- row B: sources -->
<rect x="92" y="418" width="192" height="28" rx="8" fill="#fbf3ef" stroke="#f0d9cf" stroke-width="1.5"/><text x="188" y="437" font-size="12" font-weight="800" letter-spacing="1" fill="#dc4405" text-anchor="middle">SOURCES</text>
<text x="308" y="440" font-size="16" fill="#2a2a2a">Uploaded prior testimony · Westlaw · Practical Law</text>
<line x1="88" y1="462" x2="1192" y2="462" stroke="#f2f2f2" stroke-width="1.5"/>

<!-- row C: validation note -->
<rect x="92" y="482" width="192" height="28" rx="8" fill="#fbf3ef" stroke="#f0d9cf" stroke-width="1.5"/><text x="188" y="501" font-size="12" font-weight="800" letter-spacing="1" fill="#dc4405" text-anchor="middle">VALIDATION NOTE</text>
<text x="308" y="496" font-size="16" fill="#2a2a2a">Open each flagged statement and confirm it against the transcript</text>
<text x="308" y="518" font-size="16" fill="#2a2a2a">before relying on it.</text>
<line x1="88" y1="538" x2="1192" y2="538" stroke="#f2f2f2" stroke-width="1.5"/>

<!-- row D: owner -->
<rect x="92" y="554" width="192" height="28" rx="8" fill="#fbf3ef" stroke="#f0d9cf" stroke-width="1.5"/><text x="188" y="573" font-size="12" font-weight="800" letter-spacing="1" fill="#dc4405" text-anchor="middle">OWNER</text>
<text x="308" y="576" font-size="16" fill="#2a2a2a">M. Ruiz — Litigation · last updated May 2026</text>

<!-- callout -->
<rect x="69" y="638" width="1152" height="54" rx="13" fill="#16140f" opacity="0.10"/><rect x="66" y="633" width="1152" height="54" rx="13" fill="#16140f" opacity="0.06"/><rect x="64" y="630" width="1152" height="54" rx="13" fill="#ffffff" stroke="#dc4405" stroke-width="2.5"/>
<text x="640" y="664" font-size="17.5" font-weight="700" fill="#16140f" text-anchor="middle">Every field earns its place <tspan fill="#dc4405">&#8594;</tspan> clear, reliable, and ready for the whole team.</text>
<text x="1216" y="810" font-size="11.5" fill="#b8bdc2" text-anchor="end">Illustrative UI mock for training · independent work sample, not affiliated with Thomson Reuters</text></svg>
