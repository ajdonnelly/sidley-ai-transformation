<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Inter, Arial, sans-serif">
<rect width="1280" height="820" fill="#ffffff"/>
<circle cx="70" cy="48" r="9" fill="none" stroke="#dc4405" stroke-width="3" stroke-dasharray="3 2"/><text x="90" y="54" font-size="17" font-weight="700" fill="#1a1a1a">CoCounsel</text><text x="210" y="54" font-size="16" fill="#6b7280">·  Deep Research  ·  Family Law Demo</text><line x1="64" y1="74" x2="1216" y2="74" stroke="#ececec" stroke-width="2"/>
<text x="64" y="126" font-size="14.5" font-weight="800" letter-spacing="2.5" fill="#dc4405">WHY THIS MATTERS</text>
<text x="64" y="166" font-size="31" font-weight="800" fill="#16140f">Move beyond luck</text>
<text x="64" y="200" font-size="17" fill="#6b7280">Occasional wins depend on a few people. A system makes value reliable — and compounding — for the whole team.</text>

<!-- LEFT: today / occasional -->
<rect x="64" y="240" width="540" height="360" rx="16" fill="#f6f5f3" stroke="#e5e5e2" stroke-width="2"/>
<text x="96" y="286" font-size="13.5" font-weight="800" letter-spacing="2" fill="#9a9a95">TODAY</text>
<text x="96" y="318" font-size="23" font-weight="800" fill="#4b4f52">Occasional &amp; individual</text>
<circle cx="104" cy="360" r="3.5" fill="#b6b6b1"/><text x="120" y="365" font-size="16.5" fill="#5b6166">Depends on a few people who prompt well</text>
<circle cx="104" cy="396" r="3.5" fill="#b6b6b1"/><text x="120" y="401" font-size="16.5" fill="#5b6166">Wins are sporadic and uneven</text>
<circle cx="104" cy="432" r="3.5" fill="#b6b6b1"/><text x="120" y="437" font-size="16.5" fill="#5b6166">Value walks out when they&#8217;re busy or gone</text>
<line x1="96" y1="556" x2="572" y2="556" stroke="#dcdcd8" stroke-width="2"/>
<circle cx="150" cy="520" r="7" fill="#c2c2bd"/><circle cx="228" cy="542" r="7" fill="#c2c2bd"/><circle cx="300" cy="506" r="7" fill="#c2c2bd"/><circle cx="372" cy="544" r="7" fill="#c2c2bd"/><circle cx="446" cy="522" r="7" fill="#c2c2bd"/><circle cx="520" cy="538" r="7" fill="#c2c2bd"/>
<text x="334" y="584" font-size="14" font-style="italic" fill="#9a9a95" text-anchor="middle">scattered, one-off wins</text>

<!-- arrow -->
<text x="640" y="432" font-size="40" font-weight="800" fill="#dc4405" text-anchor="middle">&#8594;</text>

<!-- RIGHT: the opportunity / system -->
<rect x="676" y="240" width="540" height="360" rx="16" fill="#ffffff" stroke="#dc4405" stroke-width="2.5"/>
<text x="708" y="286" font-size="13.5" font-weight="800" letter-spacing="2" fill="#dc4405">THE OPPORTUNITY</text>
<text x="708" y="318" font-size="23" font-weight="800" fill="#16140f">A systematic approach</text>
<circle cx="716" cy="360" r="3.5" fill="#dc4405"/><text x="732" y="365" font-size="16.5" fill="#3f4144">Shared habits and repeatable processes</text>
<circle cx="716" cy="396" r="3.5" fill="#dc4405"/><text x="732" y="401" font-size="16.5" fill="#3f4144">Reliable value for the whole team</text>
<circle cx="716" cy="432" r="3.5" fill="#dc4405"/><text x="732" y="437" font-size="16.5" fill="#3f4144">Wins compound over time</text>
<line x1="708" y1="556" x2="1184" y2="556" stroke="#f0cdbf" stroke-width="2"/>
<rect x="734" y="524" width="52" height="32" rx="4" fill="#dc4405" opacity="0.45"/>
<rect x="820" y="506" width="52" height="50" rx="4" fill="#dc4405" opacity="0.6"/>
<rect x="906" y="484" width="52" height="72" rx="4" fill="#dc4405" opacity="0.75"/>
<rect x="992" y="460" width="52" height="96" rx="4" fill="#dc4405" opacity="0.88"/>
<rect x="1078" y="432" width="52" height="124" rx="4" fill="#dc4405"/>
<text x="946" y="584" font-size="14" font-style="italic" fill="#c06a4b" text-anchor="middle">reliable, compounding value</text>

<!-- callout -->
<rect x="69" y="634" width="1152" height="54" rx="13" fill="#16140f" opacity="0.10"/><rect x="66" y="629" width="1152" height="54" rx="13" fill="#16140f" opacity="0.06"/><rect x="64" y="626" width="1152" height="54" rx="13" fill="#ffffff" stroke="#dc4405" stroke-width="2.5"/>
<text x="640" y="660" font-size="17.5" font-weight="700" fill="#16140f" text-anchor="middle">Build habits and processes around how you use AI <tspan fill="#dc4405">&#8594;</tspan> sporadic wins become lasting value.</text>
